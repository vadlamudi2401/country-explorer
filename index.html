<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Country Explorer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header id="main-header">
        <div class="header-container">
            <img src="assets/world.png" alt="World Logo" class="logo">
            <h1>Country Explorer</h1>
        </div>
    </header>

    <main id="content-area">
        
        <section id="controls-section">
            <form id="filter-form" onsubmit="event.preventDefault();">
                
                <div class="filter-group">
                    <label for="search-input">Country Name</label>
                    <input type="text" id="search-input" placeholder="Search by Country Name..." />
                </div>

                <div class="filter-group">
                    <label for="region-filter">Region</label>
                    <select id="region-filter">
                        <option value="">All Regions</option>
                        <option value="Africa">Africa</option>
                        <option value="Americas">Americas</option>
                        <option value="Asia">Asia</option>
                        <option value="Europe">Europe</option>
                        <option value="Oceania">Oceania</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="population-filter">Minimum Population</label>
                    <input type="number" id="population-filter" placeholder="e.g. 100,000" min="0" max="1500000000" step="10000" value="0" />
                </div>

            </form>
        </section>

        <div id="country-cards-container"></div>

        <div class="pagination-container">
            <button id="show-more-btn">Show More</button>
        </div>

    </main>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
